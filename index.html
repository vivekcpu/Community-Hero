<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Hero</title>
    <script>
      // Gracefully handle and suppress benign development WebSocket connection failures
      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        const msg = (reason && (reason.message || reason)) || '';
        if (/websocket/i.test(msg) || /ws:\/\//i.test(msg) || msg.includes('WebSocket closed without opened')) {
          event.preventDefault();
          console.debug('[Vite WS Suppressed Rejection]', reason);
        }
      });
      window.addEventListener('error', function(event) {
        const msg = event.message || '';
        if (/websocket/i.test(msg) || /ws:\/\//i.test(msg) || msg.includes('WebSocket closed without opened')) {
          event.preventDefault();
          console.debug('[Vite WS Suppressed Error]', msg);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
